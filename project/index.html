<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="./library/thought-bubbles.js"></script>
    <script src="./script.js" defer></script>
    <title>Whispering Woods</title>
</head>

<body>

    <!-- fog -->
    <img src="./img/fog.png" alt="fog" id="fogDown">
    <img src="./img/fog.png" alt="fog" id="fogUp">

    <!-- Logo -->
    <div>
        <img src="./img/Logo 2.png" alt="Game Logo" id="logo">
    </div>

    <!-- NAV -->
    <img src="./img/Tree 2.png" alt="Navigation Tree" id="nav-tree">

    <nav>
        <img src="./img/start.png" alt="Start Button" id="start" onclick="Start()">
        <a href="how-to-play/how-to-play.html"><img src="./img/how-to-play.png" alt="How to Play Button"
                id="how-to-play"></a>
        <a href="credits/credits.html"><img src="./img/credits.png" alt="Credits Button" id="credits"></a>
    </nav>

    <!-- Player Choose -->
    <img src="./img/player.png" alt="Player Characters" id="playerChoose">

    <div id="character-selection">
        <img src="./img/goat.png" alt="Character 1" class="character" id="goat" onclick="selectCharacter(1)">
        <img src="./img/white-sheep.png" alt="Character 2" class="character" id="white-sheep"
            onclick="selectCharacter(2)">
        <img src="./img/black-sheep.png" alt="Character 3" class="character" id="black-sheep"
            onclick="selectCharacter(3)">
    </div>

    <!-- Player Sprite -->
    <div id="player">
        <img id="spriteImg" src="./img/sprite.png" alt="sprite">
    </div>

    <!-- Thought Bubble -->
    <div id="thought-bubble">
        <p id="thoughts"></p>

        <div id="thought-controls">
            <button id="thought-next" onclick="nextOwlDialogue()">Next</button>

            <div id="thought-choice-buttons">
                <button onclick="chooseOwlPath('up')">Up</button>
                <button onclick="chooseOwlPath('down')">Down</button>
            </div>
        </div>

        <img src="./img/exclamation-mark.png" id="bubblePic">
    </div>

    <!-- Health Bar -->
    <div id="health-bar">
        <img src="./img/healthbar-full.png" alt="Health Bar" id="health">
    </div>

    <!-- Wolf -->
    <div id="wolf">
        <img src="./img/wolf-sprite.png" alt="wolf" id="wolf-img">
    </div>

    <!-- Portal -->
    <div id="portal">
        <img src="./img/portal.png" alt="portal" id="portal-img">
    </div>

    <!-- Cup -->
    <div id="cup">
        <img src="./img/cup.png" alt="cup" id="cup-img">
    </div>

    <!-- Endings -->
    <div id="game-over-screen">
        <div id="game-over-box">
            <p id="ending-text"></p>

            <div id="ending-buttons">
                <button id="restart-button" onclick="location.reload()">Play again</button>
                <button id="leaderboard-button" onclick="openLeaderboard()">Leaderboard</button>
            </div>
        </div>

        <div id="leaderboard-screen">
            <div id="leaderboard-board">
                <h2 id="leaderboard-title">Leaderboard</h2>

                <div id="leaderboard-name-entry">
                    <p id="leaderboard-name-label">Enter your name:</p>
                    <input type="text" id="leaderboard-name-input" maxlength="20" placeholder="Your name">
                    <button id="leaderboard-save-button" onclick="saveLeaderboardName()">Save</button>
                </div>

                <div id="leaderboard-list"></div>

                <button id="leaderboard-back-button" onclick="closeLeaderboard()">Back</button>
            </div>
        </div>
    </div>
</body>

</html>
